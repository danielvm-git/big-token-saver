name: CI/CD
# Unified 3-stage pipeline replacing ci.yml + release.yml.
# Based on .github/workflow-templates/ci-cd-monorepo.yml
#
# Stage 1: ci      — shellcheck, rust (build/clippy/test), install-check
# Stage 2: verify   — conventional commits, no AI attribution
# Stage 3: deploy   — cross-compile bts-map, semantic-release, npm publish
#
# Deploy uses a separate concurrency group (cancel-in-progress: false) to
# protect in-flight releases from being killed by new pushes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full-installer-check:
        description: "Run full bash install.sh + mise run doctor on Linux"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-cd-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: ci (every push/PR) ──────────────────────────────────────────

  shellcheck:
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: ShellCheck install.sh + bin/bts
        run: shellcheck install.sh bin/bts

  rust:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2

      - name: Build bts-map
        run: cargo build -p bts-map --release

      - name: Clippy
        run: cargo clippy -p bts-map -- -D warnings

      - name: Test bts-map
        run: cargo test -p bts-map

  install-check:
    if: >
      github.event_name == 'workflow_dispatch'
      && inputs.full-installer-check == true
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run full installer
        run: bash install.sh

      - name: Verify all tools present
        run: mise run doctor

  # ── Stage 2: verify (main push + workflow_dispatch only) ────────────────

  verify:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [shellcheck, rust]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Conventional Commits (PR title)
        if: github.event_name == 'pull_request'
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if ! echo "$TITLE" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: "; then
            echo "FAIL: PR title does not follow Conventional Commits: $TITLE"
            exit 1
          fi
          echo "PASS: PR title follows Conventional Commits"

      - name: Check Conventional Commits (commit messages)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git log origin/main..HEAD --oneline | while read -r line; do
            if ! echo "$line" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: "; then
              echo "FAIL: Non-conventional commit: $line"
              exit 1
            fi
          done
          echo "PASS: All commits follow Conventional Commits"

      - name: Check no AI agent attribution
        run: |
          if git log origin/main..HEAD --format="%B" | grep -qiE '^co[- ]authored[- ]by:'; then
            echo "FAIL: Co-authored-by: footer found"
            exit 1
          fi
          echo "PASS: No AI agent attribution"

  # ── Stage 3: deploy (main push + workflow_dispatch only) ───────────────
  # Cross-compile bts-map, create GitHub release, publish to npm.

  build:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [verify]
    timeout-minutes: 20
    concurrency:
      group: ci-cd-release-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            suffix: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            suffix: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            suffix: linux-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rustup target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build bts-map (release)
        run: cargo build -p bts-map --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p artifacts
          BIN="bts-map-${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/bts-map" "artifacts/$BIN"
          tar czf "artifacts/$BIN.tar.gz" -C artifacts "$BIN"
          rm "artifacts/$BIN"

      - uses: actions/upload-artifact@v4
        with:
          name: bts-map-${{ matrix.suffix }}
          path: artifacts/bts-map-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error

  release:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-cd-release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Capture pre-release tag
        id: pre-tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pre-release tag: ${TAG}"

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle bts-map binaries for npm
        run: |
          mkdir -p bin
          for suffix in darwin-arm64 darwin-x86_64 linux-x86_64; do
            tarball="artifacts/bts-map-${suffix}/bts-map-${suffix}.tar.gz"
            if [ -f "${tarball}" ]; then
              tar xzf "${tarball}" -C bin/
              echo "  bundled bin/bts-map-${suffix}"
            else
              echo "  WARNING: bts-map-${suffix} not found — skipping"
            fi
          done
          ls -lh bin/

      - name: Publish to npm
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN not configured — skipping npm publish"
            exit 0
          fi

          PRE_TAG="${{ steps.pre-tag.outputs.tag }}"
          POST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "${PRE_TAG}" = "${POST_TAG}" ]; then
            echo "No new release (tag unchanged: ${PRE_TAG}) — skipping npm publish"
            exit 0
          fi

          VERSION="${POST_TAG#v}"
          echo "→ Publishing npm package version ${VERSION} (from tag ${POST_TAG})"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
