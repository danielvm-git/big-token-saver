# CI: verify the project builds, passes lint, and the installer works on Linux.
#
# Fast checks (shellcheck, cargo build, cargo test) run on every push and PR.
# Full installer verification ( `bash install.sh` → `mise run doctor` ) runs
# on workflow_dispatch only — it downloads 12+ tools via mise and is heavy.

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full-installer-check:
        description: "Run full bash install.sh + mise run doctor on Linux"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ── Lint and build (fast, always) ────────────────────────────────────────
  lint-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck install.sh + bin/bts
        run: |
          shellcheck install.sh bin/bts

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "x86_64-unknown-linux-gnu"
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build bts-map
        run: cargo build -p bts-map --release

      - name: Clippy
        run: cargo clippy -p bts-map -- -D warnings

      - name: Test bts-map
        run: cargo test -p bts-map

  # ── Full installer verification (heavy: downloads 12+ tools) ────────────
  install-check:
    if: >
      github.event_name == 'workflow_dispatch'
      && inputs.full-installer-check == true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Run full installer
        run: |
          bash install.sh

      - name: Verify all tools present
        run: |
          mise run doctor
