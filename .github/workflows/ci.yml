# CI: verify the project builds, passes lint, and the installer works on Linux.
#
# Fast checks (shellcheck, cargo build, cargo test) run on every push and PR.
# Full installer verification ( `bash install.sh` → `mise run doctor` ) runs
# on workflow_dispatch only — it downloads 12+ tools via mise and is heavy.

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full-installer-check:
        description: "Run full bash install.sh + mise run doctor on Linux"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint and build (fast, always) ────────────────────────────────────────
  lint-build:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # shellcheck is pre-installed on ubuntu runners; install via brew on macOS
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: ShellCheck install.sh + bin/bts
        run: shellcheck install.sh bin/bts

      # rustup reads rust-toolchain.toml at repo root — channel is set there
      - uses: Swatinem/rust-cache@v2

      - name: Build bts-map
        run: cargo build -p bts-map --release

      - name: Clippy
        run: cargo clippy -p bts-map -- -D warnings

      - name: Test bts-map
        run: cargo test -p bts-map

  # ── Full installer verification (heavy: downloads 12+ tools) ────────────
  install-check:
    if: >
      github.event_name == 'workflow_dispatch'
      && inputs.full-installer-check == true
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Run full installer
        run: bash install.sh

      - name: Verify all tools present
        run: mise run doctor
