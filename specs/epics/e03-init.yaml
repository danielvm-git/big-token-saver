epic: e03
title: "bts init — per-project wiring"
milestone: m1
wsjf: 9.0
status: ready
summary: "Per-project bootstrap: .bts.toml + .envrc + agent hook, idempotent."

stories:
  - id: e03s01
    title: "init scaffolds .bts.toml and .envrc, idempotently"
    tasks:
      - desc: "bts init writes .bts.toml and .envrc in an empty dir"
        verify: "BTS=$PWD/bin/bts; d=$(mktemp -d); (cd \"$d\" && \"$BTS\" init && test -f .bts.toml && test -f .envrc)"
      - desc: "running bts init twice is idempotent (exit 0 both times)"
        verify: "BTS=$PWD/bin/bts; d=$(mktemp -d); (cd \"$d\" && \"$BTS\" init >/dev/null && \"$BTS\" init >/dev/null)"

  - id: e03s02
    title: "init delegates agent-hook wiring to sqz/rtk's own installers (no hand-rolled JSON)"
    # Refined 2026-06-16 (d09): source read of sqz + rtk shows both ship their own hook
    # installers (`sqz init --only claude`, `rtk init --agent claude`). bts init must call
    # them, not write PreToolUse JSON itself.
    tasks:
      - desc: "bts init invokes `sqz init` and `rtk init` for the active agent (Claude Code first), guarded by command -v — it does NOT hand-roll PreToolUse JSON"
        verify: "grep -qE 'sqz[[:space:]]+init' bin/bts && grep -qE 'rtk[[:space:]]+init' bin/bts && grep -qE 'command -v (sqz|rtk)' bin/bts"
      - desc: "hook wiring degrades gracefully when sqz/rtk are absent: warns, points at doctor, init still exits 0"
        # PATH=/usr/bin:/bin keeps bash/coreutils but drops mise(homebrew)/sqz(~/.local)/rtk(homebrew) -> clean absent sandbox
        verify: "BTS=$PWD/bin/bts; d=$(mktemp -d); (cd \"$d\" && PATH=/usr/bin:/bin \"$BTS\" init 2>&1 | grep -qi doctor)"
