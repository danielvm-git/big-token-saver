epic: e06
title: "Cross-platform + published installer"
milestone: m3
wsjf: 4.0
status: ready
summary: "Demand-driven: CI builds bts-map, curl|bash installer, Linux verification."

stories:
  - id: e06s01
    title: "Release CI builds bts-map and the installer is documented"
    tasks:
      - desc: "GitHub Actions release workflow exists"
        verify: "test -f .github/workflows/release.yml"
      - desc: "curl|bash install path is documented in the README"
        verify: "grep -q 'install.sh' README.md"

  - id: e06s02
    title: "Installer verified on a fresh Linux box"
    tasks:
      - desc: "MANUAL/CI: `bash install.sh` then `mise run doctor` is green on fresh Linux"
        verify: "echo 'manual: run in a clean Linux container; see e06s01 CI'"

  - id: e06s03
    title: "npm distribution — global install + npx zero-install"
    wsjf: 3.7
    wsjf_rationale: "BV=5 (npm is default JS/TS dev manager), TC=3 (flexible; curl|bash already works), RR=3 (npx enables frictionless PATH-free use), JS=3 (2-3 days)"
    tasks:
      - desc: "package.json with bin entry pointing to bts dispatcher; prebuild bts-map binaries per platform via optionalDependencies (esbuild-style pattern)"
        verify: "npm pack --dry-run lists bin/bts + platform-specific bts-map binary"
      - desc: "npm publish workflow wired into CI (.github/workflows/release.yml); gh release triggers npm publish"
        verify: "grep -q 'npm publish' .github/workflows/release.yml"
      - desc: "global install works: npm install -g big-token-saver then bts map --budget 64 . produces a ranked map"
        verify: "npm install -g . && bts map --budget 64 . | head -3 | grep -q 'crates/bts-map'"
      - desc: "npx zero-install path: npx big-token-saver doctor in a temp dir reports tools or degrades gracefully"
        verify: "cd $(mktemp -d) && npx big-token-saver doctor 2>&1 | grep -qE '(ok|missing|install)'"
