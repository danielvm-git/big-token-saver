        gates:
          - "shellcheck passes (0 warnings)"
          - "bash -n passes"
          - "bts config show reports source per key"
          - "bts config set updates project .bts.toml idempotently"
          - "bts config init creates global config with correct default values"
      - desc: "bts compress wrapping installed sqz with opinionated defaults and budget awareness"
        verify: "bin/bts compress delegates to sqz; respects --budget flag and config token_budget; supports stdin and file args"
        gates:
          - "bts compress --budget 512 file.txt shells sqz compress"
          - "echo input | bts compress pipes through sqz"
          - "budget defaults to BTS_TOKEN_BUDGET when no --budget flag"
      - desc: "regret-style learning on bts map via feedback JSON + PageRank score adjustment"
        verify: "bts map feedback --good/--bad records selections; bts-map binary reads feedback and adjusts scores; feedback tests pass"
        gates:
          - "bts map feedback --good src/a.rs increments good count in JSON"
          - "bts map feedback --show displays current feedback state"
          - "bts map feedback --clear resets all feedback"
          - "cargo test -p bts-map passes all 16 tests (includes feedback_adjusts_scores, feedback_noop_for_unknown_files, feedback_can_reorder)"
