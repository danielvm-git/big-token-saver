pivot:
  date: 2026-06-15
  from: "4-layer token-saving middleware product (orchestrator linking sqz-engine/ELv2 + shelling rtk/opensrc + porting aider)"
  to:   "single-command toolchain bootstrapper + thin unifier; bts map as the one owned Rust add-on"
  reason: >
    A 4-angle red team dismantled the product thesis (no moat; 3 of 4 layers already
    native/commodity; eroding token value + prompt-cache hazards; ELv2 distribution
    mislabeling; secret-leaking tee store). The user's real goal was never a product —
    it was ending the pain of installing a scattered toolchain across 5 package
    managers. See memory/red-team-findings.md.

decisions:
  - id: d01
    text: "Scope = a toolchain bootstrapper + thin unifier for the user's AI-coding workflow. NOT a token-saving product."
  - id: d02
    text: "Install upstream from official sources via mise; never bundle or relink. Shipped artifacts contain zero ELv2 code -> no ELv2 obligations."
    supersedes: "old d02 (ELv2 cargo-feature firewall) — no longer needed; bts does not link sqz at all."
  - id: d03
    text: "Stand on mise as the install engine (backends: registry/aqua, npm, pipx, ubi). Do not hand-roll cross-PM installation."
  - id: d04
    text: "rtk + sqz install via ubi (GitHub release binaries), NOT crates.io (rtk's crate is a stale v0.1.0 stub; sqz ships binaries)."
  - id: d05
    text: "Unifier is shell-first (a ~100-line `bts` dispatcher + verb functions). Rust is used ONLY for `bts map`."
  - id: d06
    text: "bts map is the single owned, net-new capability (aider PageRank + .scm queries), Apache-2.0. Pin grammar crates to match the .scm ABI (red team's hardest technical risk)."
  - id: d07
    text: "Personal-first, shareable. If published, the installer declares dependencies; it does not contain them."
  - id: d08
    text: "`bts docs` is NOT a run-and-pipe verb: context7 is an MCP server, not a CLI. e04 redefines `bts docs` as show/launch the context7 MCP config for the active agent."
    source: "source-grounded read of @upstash/context7-mcp (2026-06-16)"
  - id: d09
    text: "`bts init` delegates hook injection to the tools' own installers (`sqz init --only claude --yes`, `rtk init --agent claude --auto-patch`) — it does NOT hand-roll PreToolUse JSON. e03 wires by calling them."
    source: "source-grounded read of sqz + rtk (2026-06-16); implemented + verified e03 (2026-06-17)"
    side_effects: >
      Observed in e03 build: delegation inherits the tools' full init behavior. `sqz init`
      writes a PROJECT-scoped .claude/settings.local.json (good) but also ensures user-level
      shell integration (.zshrc hook, zsh completions, ~/.sqz preset — all idempotent).
      `rtk init` injects rtk instructions into the project's CLAUDE.md and writes .rtk/filters.toml.
      Neither touches global ~/.claude/settings.json. This is the accepted trade-off of d09
      (delegate, don't hand-roll). Document in `bts init` help so users aren't surprised.
  - id: d10
    text: "e05 grammar pinning PROVEN VIABLE by spike (2026-06-17). Pins: tree-sitter =0.24.6 + tree-sitter-rust/python/typescript 0.23.x + streaming-iterator. Mandatory CI gate = per-language non-empty def+ref AND def node-kind=='identifier'. Silent-empty-map is real only for STRUCTURAL mismatch (0.24.x catches name/field/structure errors at compile time)."
    source: "specs/archive/spikes/SPIKE-bts-map.md; e05-map.yaml spike_findings; adr/0005 Validation section"
  - id: d11
    text: "e05s03 shipped 10 langs (tree-sitter 0.24.6 + grammars 0.23.x; JS/Go/Java/Ruby/C/C++ added; Swift via npezza93-tree-sitter-swift fork due to ABI-15 clash). Budget via tiktoken-rs (greedy include). Skeleton renderer (simplified, NOT a full grep_ast.TreeContext clone). Snapshot drift-tested (fails on change)."
    caveats: >
      THREE known issues identified before publishing the crate — all addressed 2026-06-17:
      (1) PROVENANCE: RESOLVED. C/C++/Swift divergent .scm relocated from vendor/queries/ (now
      verbatim upstream) to a separate queries/ dir. See queries/c-tags.scm, queries/cpp-tags.scm,
      queries/swift-tags.scm for the working divergent copies. vendor/queries/ is pure verbatim.
      (2) Swift fork crate: DOCUMENTED + TRACKED. Added deny.toml supply-chain config and
      SWIFT-FORK-TRACKING comments in Cargo.toml and tags.rs. Cannot resolve until tree-sitter
      core is bumped to >=0.25 (would allow official tree-sitter-swift with ABI v15).
      (3) snapshot test: RESOLVED. Now FAILS if expected_snapshot.txt is absent, with a clear
      error message instructing GENERATE_SNAPSHOT=1 cargo test -p bts-map snapshot to regenerate.

